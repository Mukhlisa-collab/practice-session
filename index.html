<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Magic Website</title>
    
    <!-- یہ CSS ہے (ویب سائٹ کا میک اپ) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 80px;
            transition: background-color 0.5s, color 0.5s; /* یہ رنگ بدلنے کو سموتھ بنائے گا */
        }
        
        .card {
            background-color: #f4f4f4;
            width: 300px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.5s;
        }

        .card img {
            border-radius: 50%;
            width: 120px;
            border: 3px solid #007bff;
        }

        h1 { margin: 10px 0 5px 0; }
        p { color: gray; margin-bottom: 20px; }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover { background-color: #0056b3; }

        /* ڈارک موڈ کا جادو */
        body.dark-theme { background-color: #222; color: white; }
        body.dark-theme .card { background-color: #333; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        body.dark-theme p { color: #bbb; }
    </style>
</head>

<body>

    <!-- یہ HTML ہے (ویب سائٹ کا ڈھانچہ) -->
    <div class="card">
        <!-- تصویر کی جگہ میں نے ایک ڈمی لنک لگایا ہے جو خودکار نام کا لوگو بنا دے گا -->
        <img src="https://ui-avatars.com/api/?name=Mukhlisa+Muneer&background=random&size=150" alt="Profile Image">
        
        <h1 id="myName">Mukhlisa Muneer</h1>
        <p>Tuwailibatul ilm</p>
        
        <!-- اس بٹن پر کلک کرنے سے جاوا سکرپٹ چلے گی -->
        <button onclick="changeTheme()">See the Magic... Yayyy!! 🌙</button>
    </div>

    <!-- یہ جاوا سکرپٹ ہے (ویب سائٹ کا دماغ) -->
    <script>
        function changeTheme() {
            var bodyElement = document.body;
            bodyElement.classList.toggle("dark-theme");
        }
    </script>

</body>
</html>
